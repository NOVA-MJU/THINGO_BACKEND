name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🔐 SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: 📝 Create remote deploy script (locally)
        shell: bash
        run: |
          cat > deploy_remote.sh <<EOS
          #!/usr/bin/env bash
          set -Eeuo pipefail

          APP_DIR="/home/ubuntu/MJS_BACKEND"
          SERVICE_NAME="MJS_BACKEND"
          APP_PORT="8080"
          JAR_NAME="MJS_BACKEND-0.0.1-SNAPSHOT.jar"
          JAR_PATH="\${APP_DIR}/build/libs/\${JAR_NAME}"

          MAX_WAIT="\${MAX_WAIT:-60}"

          log(){ printf "\n[%(%F %T)T] %s\n" -1 "\$*"; }
          trap 'log "❌ 실패: 라인 \$LINENO (명령: \$BASH_COMMAND)"; exit 1' ERR

          log "who=\$(whoami) host=\$(hostname)"
          set -x

          ssh-keyscan -H github.com | sudo tee -a /etc/ssh/ssh_known_hosts > /dev/null || true

          cd "\${APP_DIR}"

          git fetch origin
          git checkout main
          git pull --ff-only origin main

          git submodule sync --recursive
          git submodule update --init --recursive --remote
          git submodule foreach --recursive 'git reset --hard || true'
          git submodule foreach --recursive 'git clean -fdx || true'

          chmod +x ./gradlew || true
          ./gradlew clean bootJar -x test

          test -f "\${JAR_PATH}" || { set +x; log "❌ JAR 미존재"; exit 1; }

          # 🔥 핵심 1: docker-compose용 env 생성
          echo "REDIS_PASSWORD=\${REDIS_PASSWORD}" > "\${APP_DIR}/.env"

          # 🔥 핵심 2: Redis 재시작 (env 반영)
          docker-compose down
          docker-compose up -d

          # systemd env도 유지 (Spring용)
          echo "REDIS_PASSWORD=\${REDIS_PASSWORD}" | sudo tee /home/ubuntu/.env > /dev/null

          sudo systemctl daemon-reload || true
          sudo systemctl restart "\${SERVICE_NAME}"

          set +x

          alive(){ systemctl is-active --quiet "\${SERVICE_NAME}"; }

          ready_by_log(){
            journalctl -u "\${SERVICE_NAME}" -n 400 --no-pager 2>/dev/null | \
            grep -Eq "Started .* in .* seconds|Tomcat started on port|Started MjsApplication"
          }

          ready_by_http(){
            curl -fsS "http://127.0.0.1:\${APP_PORT}/actuator/health" >/dev/null 2>&1
          }

          log "🩺 헬스체크 시작"

          for i in \$(seq 1 "\${MAX_WAIT}"); do
            if ! alive; then
              log "❌ 서비스 비활성"
              journalctl -u "\${SERVICE_NAME}" -n 200 --no-pager || true
              exit 1
            fi

            if ready_by_log || ready_by_http; then
              log "✅ 준비 완료"
              exit 0
            fi

            sleep 1
          done

          log "⚠️ 헬스체크 실패"
          journalctl -u "\${SERVICE_NAME}" -n 200 --no-pager || true
          exit 1
          EOS

          chmod +x deploy_remote.sh

      - name: 📤 Upload deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./deploy_remote.sh \
            "${{ secrets.EC2_USER }}"@"${{ secrets.EC2_HOST }}":/home/ubuntu/deploy_remote.sh

      - name: 🚀 Run deploy script on EC2
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}"@"${{ secrets.EC2_HOST }}" \
            "REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' MAX_WAIT=60 bash /home/ubuntu/deploy_remote.sh"

      - name: 📜 Show logs
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}"@"${{ secrets.EC2_HOST }}" \
            "journalctl -u MJS_BACKEND -n 120 --no-pager || true"