name: mjs-backend

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/userdict_ko.txt:/usr/share/elasticsearch/config/userdict_ko.txt
      - ./docker/elasticsearch/synonyms.txt:/usr/share/elasticsearch/config/synonyms.txt
    ulimits:
      memlock:
        soft: -1
        hard: -1
    cap_add:
      - IPC_LOCK
    command: >
      bash -c "
        if [ ! -d /usr/share/elasticsearch/plugins/analysis-nori ]; then
          elasticsearch-plugin install --batch analysis-nori;
        fi &&
        /usr/local/bin/docker-entrypoint.sh
      "
    networks: [ app ]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    depends_on:
      - elasticsearch
    networks: [ app ]

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks: [ app ]
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - ./infra/redis/data:/data

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./MJS-BACK-SECURITY/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks: [ mon ]

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./MJS-BACK-SECURITY/promtail-config.yml:/etc/promtail/config.yml:ro
      - /home/ubuntu/MJS_BACKEND/logs:/var/log/mjs_backend_logs:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    command: -config.file=/etc/promtail/config.yml
    networks: [ mon ]

  grafana:
    image: grafana/grafana:10.4.5
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=mjsearch2025@gmail.com
      - GF_SMTP_PASSWORD=ncbc aqip zamv zfhq
      - GF_SMTP_FROM_ADDRESS=mjsearch2025@gmail.com
      - GF_SMTP_FROM_NAME=Thingo 경고 메일
      - GF_SMTP_SKIP_VERIFY=true
    depends_on:
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [ mon ]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MJS-BACK-SECURITY/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
    networks: [ mon ]

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    restart: unless-stopped
    expose:
      - "9100"
    networks: [ mon ]
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  k6:
    image: grafana/k6:0.53.0
    container_name: k6
    profiles: [ "loadtest" ]
    networks: [ mon ]
    volumes:
      - ./k6/scripts:/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BASE_URL=http://host.docker.internal:8080
      - K6_OUT=experimental-prometheus-rw
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
    command: run /scripts/notice_list.js

volumes:
  esdata:
  kibana_data:
  loki_data:
  grafana_data:
  promtail_positions:
  prometheus_data:

networks:
  app:
    driver: bridge
  mon:
    driver: bridge
