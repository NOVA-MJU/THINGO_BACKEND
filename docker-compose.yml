version: '3.8'   # ← 이 줄은 최근 Compose V2에선 경고만 뜨니 삭제해도 무방

services:
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    networks: [ app ]
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - ./infra/redis/data:/data

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    volumes:
      - ./MJS-BACK-SECURITY/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped
    networks: [ mon ]


  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - ./MJS-BACK-SECURITY/promtail-config.yml:/etc/promtail/config.yml:ro
      - /home/ubuntu/MJS_BACKEND/logs:/var/log/mjs_backend_logs:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks: [ mon ]

  grafana:
    image: grafana/grafana:10.4.5
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # SMTP 설정 추가
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=mjsearch2025@gmail.com
      - GF_SMTP_PASSWORD=ncbc aqip zamv zfhq
      - GF_SMTP_FROM_ADDRESS=mjsearch2025@gmail.com
      - GF_SMTP_FROM_NAME=Thingo 경고 메일
      - GF_SMTP_SKIP_VERIFY=true

    depends_on:
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [ mon ]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MJS-BACK-SECURITY/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    networks: [ mon ]


  node_exporter:
    image: prom/node-exporter:latest
    expose:
      - "9100"
    networks: [ mon ]
    # host의 /proc, /sys 등을 읽기 위해 권장되는 옵션들
    pid: host
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  k6:
    image: grafana/k6:latest
    profiles: [ "loadtest" ]
    networks: [ mon ]
    volumes:
      - ./k6/scripts:/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BASE_URL=http://host.docker.internal:8080
      - K6_OUT=experimental-prometheus-rw
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
    command: run /scripts/notice_list.js


volumes:
  loki_data:
  grafana_data:
  promtail_positions:

networks:
  app:
    driver: bridge
  mon:
    driver: bridge

